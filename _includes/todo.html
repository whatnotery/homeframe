<h3 class="pico-color-cyan-450 font-roboto">Todos</h3>

<div id="todo-minimal">
    <form id="todo-form">
        <fieldset role="group">
            <input
                class="pico-background-sand-150 pico-color-cyan-450 font-roboto"
                type="text"
                id="todo-input"
                placeholder="Add Todo..."
                required
            />
            <button type="submit">+</button>
        </fieldset>
    </form>
    <ul id="todo-list"></ul>
</div>
